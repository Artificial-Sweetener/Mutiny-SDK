name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: ["**"]
  workflow_dispatch:

jobs:
  lint-type-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
          python -m pip install build
      - name: Ruff (lint)
        run: ruff check .
        # Temporarily soft-fail until existing lint issues are resolved
        continue-on-error: true
      - name: Mypy (types)
        run: mypy mutiny
      - name: Unit tests
        run: pytest -m "not network" -q
      - name: Packaging smoke test
        run: |
          python -m build
          python -m venv .venv-package-smoke
          . .venv-package-smoke/bin/activate
          pip install --upgrade pip
          pip install dist/*.whl
          python -c "from mutiny import Config, Mutiny; print(Config, Mutiny)"
      - name: Consistency report (non-blocking)
        run: |
          mkdir -p .cache/mutiny
          python tools/check_consistency.py --json-out .cache/mutiny/check_consistency_report.json
        continue-on-error: true
      - name: Upload consistency report artifact
        uses: actions/upload-artifact@v4
        with:
          name: check-consistency-report-py${{ matrix.python-version }}
          path: .cache/mutiny/check_consistency_report.json
          if-no-files-found: warn

  network-tests:
    # Manual trigger only, requires secrets configured in repo
    if: ${{ github.event_name == 'workflow_dispatch' }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -e .[dev]
      - name: Validate network test secrets
        run: |
          test -n "${MJ_USER_TOKEN}"
          test -n "${MJ_GUILD_ID}"
          test -n "${MJ_CHANNEL_ID}"
          test -n "${MJ_USER_AGENT}"
        env:
          MJ_USER_TOKEN: ${{ secrets.MJ_USER_TOKEN }}
          MJ_GUILD_ID: ${{ secrets.MJ_GUILD_ID }}
          MJ_CHANNEL_ID: ${{ secrets.MJ_CHANNEL_ID }}
          MJ_USER_AGENT: ${{ secrets.MJ_USER_AGENT }}
      - name: Run network tests
        env:
          MJ_USER_TOKEN: ${{ secrets.MJ_USER_TOKEN }}
          MJ_GUILD_ID: ${{ secrets.MJ_GUILD_ID }}
          MJ_CHANNEL_ID: ${{ secrets.MJ_CHANNEL_ID }}
          MJ_USER_AGENT: ${{ secrets.MJ_USER_AGENT }}
        run: pytest -m network -s
