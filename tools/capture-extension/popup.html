<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MJ Capture</title>
    <style>
      body { font: 13px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 10px; }
      button { padding: 6px 10px; margin-right: 6px; cursor: pointer; }
      .row { margin-bottom: 8px; }
      #count { font-weight: 600; }
    </style>
  </head>
  <body>
    <div class="row">
      <label><input type="checkbox" id="enabled" /> Capture Enabled</label>
    </div>
    <div class="row">
      <span>Events captured: <span id="count">0</span></span>
    </div>
    <div class="row">
      <button id="download">Download JSONL</button>
      <button id="clear">Clear</button>
    </div>
    <div class="row">
      <pre id="last" style="max-width:380px; max-height: 180px; overflow:auto; background:#f7f7f7; padding:6px; border-radius:4px;"></pre>
    </div>
    <script src="popup.js"></script>
  </body>
  </html>
