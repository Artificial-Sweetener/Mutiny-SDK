<!doctype html>
<html>
  <head>
    <meta charset="utf-8" />
    <title>MJ Capture</title>
    <style>
      body { font: 13px/1.4 system-ui, -apple-system, Segoe UI, Roboto, sans-serif; margin: 10px; min-width: 340px; }
      button { padding: 6px 10px; margin-right: 6px; cursor: pointer; }
      .row { margin-bottom: 8px; }
      #count { font-weight: 600; }
      pre { max-height: 220px; overflow: auto; background: #f7f7f7; padding: 6px; border-radius: 4px; }
    </style>
  </head>
  <body>
    <div class="row"><label><input type="checkbox" id="enabled" /> Capture Enabled</label></div>
    <div class="row">Events captured: <span id="count">0</span></div>
    <div class="row">
      <button id="download">Download JSONL</button>
      <button id="clear">Clear</button>
    </div>
    <div class="row"><pre id="last"></pre></div>
    <script src="popup.js"></script>
  </body>
  </html>
